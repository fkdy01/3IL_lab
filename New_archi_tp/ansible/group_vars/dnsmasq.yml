dnsmasq_upstream_dns:
  - "1.1.1.1"
  - "8.8.8.8"

dnsmasq_domain: "campus12avenue.fr"

dnsmasq_interfaces:
  - { name: "eth1", net: "infra" }
  - { name: "eth2", net: "dev" }
  - { name: "eth3", net: "prod" }

dnsmasq_scopes:
  infra:
    iface: "eth1"
    start: "10.10.10.100"
    end: "10.10.10.200"
    lease: "12h"
    netmask: "255.255.255.0"
    dns: "10.10.10.10"
    # router: "10.10.10.1"   # optionnel si tu as un gateway L3
  dev:
    iface: "eth2"
    start: "10.10.20.100"
    end: "10.10.20.200"
    lease: "12h"
    netmask: "255.255.255.0"
    dns: "10.10.20.10"
    # router: "10.10.20.1"
  prod:
    iface: "eth3"
    start: "10.10.30.100"
    end: "10.10.30.200"
    lease: "12h"
    netmask: "255.255.255.0"
    dns: "10.10.30.10"
    # router: "10.10.30.1"

# Pour éviter les conflits DNS (warning resolvconf/systemd-resolved)
dnsmasq_disable_systemd_resolved: false # mets true si tu veux que dnsmasq soit le DNS "principal"
